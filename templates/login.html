<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Control Mass - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor principal */
        .login-container {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
        }

        /* Logo o ícono */
        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-icon {
            font-size: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 80px;
            height: 80px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #6c757d;
            margin-bottom: 32px;
            font-size: 14px;
            font-weight: 500;
        }

        /* Formulario */
        .form-group {
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border-radius: 16px;
            padding: 4px 16px;
            border: 1px solid #e9ecef;
            transition: all 0.2s ease;
        }

        .input-group:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-icon {
            font-size: 20px;
            margin-right: 12px;
            color: #adb5bd;
        }

        input {
            width: 100%;
            padding: 14px 0;
            border: none;
            background: transparent;
            font-size: 15px;
            outline: none;
            font-weight: 500;
        }

        input::placeholder {
            color: #adb5bd;
            font-weight: 400;
        }

        /* Botón mostrar/ocultar contraseña */
        .password-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            padding: 0;
            margin-left: 8px;
            color: #adb5bd;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        /* Botón de login */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Información de acceso */
        .info {
            margin-top: 28px;
            text-align: center;
            font-size: 12px;
            background: #f1f3f5;
            padding: 12px 16px;
            border-radius: 16px;
            color: #495057;
        }

        .info-line {
            display: inline-block;
            margin: 0 8px;
        }

        .user-demo {
            font-family: monospace;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: 600;
            color: #667eea;
        }

        /* Responsive para móvil */
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
                max-width: 100%;
                border-radius: 28px;
            }

            h1 {
                font-size: 24px;
            }

            .logo-icon {
                width: 64px;
                height: 64px;
                font-size: 44px;
            }

            .input-group {
                padding: 2px 14px;
            }

            input {
                padding: 12px 0;
                font-size: 14px;
            }

            .btn-login {
                padding: 12px;
                font-size: 15px;
            }

            .password-toggle {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">
                🏪
            </div>
        </div>
        <h1>Control Mass</h1>
        <div class="subtitle">Ingresa tus credenciales</div>

        <form method="POST">
            <div class="form-group">
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" name="nombre" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>
            </div>
            <div class="form-group">
                <div class="input-group">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword" tabindex="-1">
                        👁️
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login">
                Ingresar
            </button>
        </form>

        <div class="info">
            <div>📋 Accesos de prueba:</div>
            <div>
                <span class="user-demo">admin / admin123</span>
                <span class="info-line">|</span>
                <span class="user-demo">Ana / ana123</span>
            </div>
        </div>
    </div>

    <script>
        // Función para mostrar/ocultar contraseña
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            // Cambiar el tipo de input entre password y text
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Cambiar el ícono del ojito (opcional)
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });
    </script>
</body>
</html>
